<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم CRM اللحظية</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; }
        .dashboard-grid { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; width: 22%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #1e3c72; }
        .kpi-val { font-size: 28px; font-weight: bold; color: #2c3e50; margin-top: 10px; }
        .charts-container { display: flex; justify-content: space-between; background: white; padding: 20px; border-radius: 8px; }
        .chart-box { width: 48%; height: 400px; }
    </style>
</head>
<body>

    <h1>📊 لوحة تحكم المؤشرات الفورية (Real-Time CRM)</h1>
    <p>تحديث تلقائي مستمر ومباشر من واجهة بيانات Google Sheets</p>

    <div class="dashboard-grid">
        <div class="kpi-card"><h3>إجمالي العملاء</h3><div id="kpi-total" class="kpi-val">...</div></div>
        <div class="kpi-card" style="border-top-color: #2ecc71;"><h3>مغلق ناجح</h3><div id="kpi-won" class="kpi-val">...</div></div>
        <div class="kpi-card" style="border-top-color: #f1c40f;"><h3>قيد المتابعة</h3><div id="kpi-progress" class="kpi-val">...</div></div>
        <div class="kpi-card" style="border-top-color: #e74c3c;"><h3>معدل الإغلاق</h3><div id="kpi-ratio" class="kpi-val">...</div></div>
    </div>

    <div class="charts-container">
        <div id="status_chart_div" class="chart-box"></div>
        <div id="source_chart_div" class="chart-box"></div>
    </div>

    <script>
        // معرف الملف الخاص بك (ID المستخرج من الرابط الذي شاركته)
        const SHEET_ID = '15WiAu_KTjGSMq00DvjjoH106OWQC0VkipwqYeKcs9QI';
        
        google:charts.load('current', {'packages':['corechart']});
        google:charts.setOnLoadCallback(fetchSheetData);

        function fetchSheetData() {
            // استعلام جلب البيانات برمجياً من ورقة العمل
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    // معالجة البيانات النصية وتحويلها لـ JSON صحيح
                    const rawData = JSON.parse(data.substr(47).slice(0, -2));
                    const rows = rawData.table.rows;
                    
                    // تحضير المتغيرات الحسابية لـ KPIs
                    let totalLeads = rows.length;
                    let wonLeads = 0;
                    let progressLeads = 0;
                    
                    // مصفوفات لتخزين إحصائيات الرسوم البيانية
                    let statuses = {};
                    let sources = {};

                    rows.forEach(row => {
                        // فرضاً أن عمود الحالة هو العمود السادس (F) والمصدر هو السابع (G)
                        let statusVal = row.c[5] ? row.c[5].v : 'غير محدد';
                        let sourceVal = row.c[6] ? row.c[6].v : 'غير محدد';
                        
                        if(statusVal === 'مغلق ناجح') wonLeads++;
                        if(statusVal === 'قيد التواصل' || statusVal === 'قيد المتابعة') progressLeads++;
                        
                        statuses[statusVal] = (statuses[statusVal] || 0) + 1;
                        sources[sourceVal] = (sources[sourceVal] || 0) + 1;
                    });

                    // تحديث بطاقات الأداء في الواجهة
                    document.getElementById('kpi-total').innerText = totalLeads;
                    document.getElementById('kpi-won').innerText = wonLeads;
                    document.getElementById('kpi-progress').innerText = progressLeads;
                    document.getElementById('kpi-ratio').innerText = ((wonLeads / totalLeads) * 100).toFixed(1) + '%';

                    // رسم البياني للحالات
                    drawStatusChart(statuses);
                    // رسم البياني للمصادر
                    drawSourceChart(sources);
                });
        }

        function drawStatusChart(statusData) {
            let dataArray = [['الحالة', 'العدد']];
            for (let key in statusData) dataArray.push([key, statusData[key]]);
            let data = google:visualization.arrayToDataTable(dataArray);
            let options = { title: 'توزيع العملاء حسب الحالة', pieHole: 0.4, colors: ['#2ecc71', '#f1c40f', '#e74c3c', '#3498db'] };
            let chart = new google:visualization.PieChart(document.getElementById('status_chart_div'));
            chart.draw(data, options);
        }

        function drawSourceChart(sourceData) {
            let dataArray = [['المصدر', 'العدد', { role: 'style' }]];
            for (let key in sourceData) dataArray.push([key, sourceData[key], '#1e3c72']);
            let data = google:visualization.arrayToDataTable(dataArray);
            let options = { title: 'مصادر العملاء الأكثر تفاعلاً', legend: { position: 'none' } };
            let chart = new google:visualization.BarChart(document.getElementById('source_chart_div'));
            chart.draw(data, options);
        }

        // التحديث التلقائي اللحظي كل 15 ثانية دون إعادة تحميل الصفحة
        setInterval(fetchSheetData, 15000);
    </script>
</body>
</html>
