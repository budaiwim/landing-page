<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Real-Time KPIs Dashboard</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Arial;
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
    }
    header {
      padding: 20px 30px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .container {
      padding: 20px 30px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #020617;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }
    .kpi-title { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
    .kpi-value { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .kpi-sub { font-size: 11px; color: #6b7280; }

    .charts-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: #020617;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }
    .chart-title { font-size: 13px; color: #9ca3af; margin-bottom: 8px; }

    #table_div {
      background: #020617;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }
  </style>
</head>

<body>

<header>
  <h2>لوحة مؤشرات الأداء الرئيسية – Real-Time KPIs</h2>
  <span id="last-refresh">آخر تحديث: ...</span>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi_cards"></div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">(S_KPIs) اتجاه الأداء عبر الزمن</div>
      <div id="line_chart" style="height: 320px;"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">(S_M_KPIs) مقارنة مؤشرات رئيسية</div>
      <div id="bar_chart" style="height: 320px;"></div>
    </div>
  </div>

  <!-- Table -->
  <div id="table_div"></div>

</div>

<script>
google.charts.load('current', {'packages':['corechart', 'table']});
google.charts.setOnLoadCallback(initDashboard);

const SPREADSHEET_ID = '15WiAu_KTjGSMq00DvjjoH106OWQC0VkipwqYeKcs9QI';

function buildQuery(sheetName, rangeA1) {
  const base = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?`;
  const params = new URLSearchParams({
    sheet: sheetName,
    range: rangeA1,
    tq: 'select *'
  });
  return base + params.toString();
}

function initDashboard() {
  const kpiQuery   = new google.visualization.Query(buildQuery('KPIs', 'A1:D20'));
  const sKpiQuery  = new google.visualization.Query(buildQuery('KPIs', 'F1:K200'));
  const sMKpiQuery = new google.visualization.Query(buildQuery('KPIs', 'M1:O10'));

  kpiQuery.send(handleKpiResponse);
  sKpiQuery.send(handleSKpiResponse);
  sMKpiQuery.send(handleSMKpiResponse);

  document.getElementById('last-refresh').textContent =
    'آخر تحديث: ' + new Date().toLocaleString('ar-SA');
}

/* ---------------- KPIs ---------------- */

function handleKpiResponse(response) {
  if (response.isError()) {
    alert('خطأ في قراءة جدول KPIs: ' + response.getMessage());
    return;
  }
  const data = response.getDataTable();
  renderKpiCards(data);
  renderKpiTable(data);
}

function renderKpiCards(data) {
  const container = document.getElementById('kpi_cards');
  container.innerHTML = '';

  const rows = data.getNumberOfRows();
  for (let i = 0; i < rows; i++) {
    const name   = data.getValue(i, 0);
    const value  = data.getValue(i, 1);
    const target = data.getValue(i, 2);
    const note   = data.getValue(i, 3);

    const card = document.createElement('div');
    card.className = 'kpi-card';

    card.innerHTML = `
      <div class="kpi-title">${name}</div>
      <div class="kpi-value">${formatNumber(value)}</div>
      <div class="kpi-sub">
        ${target ? 'الهدف: ' + formatNumber(target) : ''}
        ${note ? ' | ' + note : ''}
      </div>
    `;

    container.appendChild(card);
  }
}

function renderKpiTable(data) {
  const table = new google.visualization.Table(document.getElementById('table_div'));
  table.draw(data, {showRowNumber: true, width: '100%', height: '100%'});
}

function formatNumber(val) {
  if (val === null || val === undefined) return '-';
  if (typeof val === 'number') {
    return val.toLocaleString('ar-SA', {maximumFractionDigits: 2});
  }
  return val;
}

/* ---------------- S_KPIs ---------------- */

function handleSKpiResponse(response) {
  if (response.isError()) {
    alert('خطأ في قراءة جدول S_KPIs: ' + response.getMessage());
    return;
  }

  const data = response.getDataTable();
  const chart = new google.visualization.LineChart(document.getElementById('line_chart'));

  chart.draw(data, {
    backgroundColor: '#020617',
    legendTextStyle: {color: '#e5e7eb'},
    hAxis: { textStyle: {color: '#9ca3af'} },
    vAxis: { textStyle: {color: '#9ca3af'}, gridlines: {color: '#1f2937'} },
    legend: {position: 'bottom'},
    colors: ['#22c55e', '#3b82f6', '#eab308', '#f97316', '#ec4899'],
    chartArea: {left: 50, top: 30, width: '80%', height: '65%'},
    lineWidth: 2,
    curveType: 'function'
  });
}

/* ---------------- S_M_KPIs ---------------- */

function handleSMKpiResponse(response) {
  if (response.isError()) {
    alert('خطأ في قراءة جدول S_M_KPIs: ' + response.getMessage());
    return;
  }

  const data = response.getDataTable();
  const chart = new google.visualization.ColumnChart(document.getElementById('bar_chart'));

  chart.draw(data, {
    backgroundColor: '#020617',
    legendTextStyle: {color: '#e5e7eb'},
    hAxis: { textStyle: {color: '#9ca3af'} },
    vAxis: { textStyle: {color: '#9ca3af'}, gridlines: {color: '#1f2937'} },
    legend: {position: 'bottom'},
    colors: ['#3b82f6', '#22c55e', '#eab308'],
    chartArea: {left: 50, top: 30, width: '80%', height: '65%'},
    bar: {groupWidth: '60%'}
  });
}

/* ---------------- Auto Refresh ---------------- */

setInterval(() => initDashboard(), 60000);
</script>

</body>
</html>
